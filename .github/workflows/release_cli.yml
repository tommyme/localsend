name: Release CLI

on:
  push:
    tags:
      - 'cli-v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            suffix: macos-arm64
          - os: macos-latest
            arch: x64
            suffix: macos-x64
          - os: ubuntu-latest
            arch: x64
            suffix: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: |
          cd cli
          dart pub get

      - name: Build CLI
        run: |
          mkdir -p build
          cd cli
          dart compile exe bin/cli.dart -o ../build/localsend

      - name: Rename artifact
        run: |
          mv build/localsend build/localsend-${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: localsend-${{ matrix.suffix }}
          path: build/localsend-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CLI ${{ github.ref_name }}
          draft: true
          files: |
            artifacts/*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
